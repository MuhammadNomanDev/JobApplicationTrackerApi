name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '8.0.x'
  BUILD_CONFIGURATION: 'Release'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore JobApplicationTrackerAPI.sln

    - name: Build
      run: dotnet build JobApplicationTrackerAPI.sln -c ${{ env.BUILD_CONFIGURATION }} --no-restore

    - name: Run Unit Tests
      run: dotnet test tests/JobApplicationTrackerAPI.UnitTests/JobApplicationTrackerAPI.UnitTests.csproj -c ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity normal --logger trx --results-directory test-results

    - name: Publish Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: test-results/

    - name: Publish API
      run: dotnet publish src/JobApplicationTrackerAPI.Api/JobApplicationTrackerAPI.Api.csproj -c ${{ env.BUILD_CONFIGURATION }} -o publish/

    - name: Upload published artifact
      uses: actions/upload-artifact@v4
      with:
        name: api-publish
        path: publish/

  docker:
    name: Build & Push Docker Image
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/job-application-tracker-api:latest
          ${{ secrets.DOCKER_USERNAME }}/job-application-tracker-api:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Azure
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure App Service
      uses: azure/webapps-deploy@v2
      with:
        app-name: job-application-tracker-api
        images: ${{ secrets.DOCKER_USERNAME }}/job-application-tracker-api:latest
